<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f11;
    --bg2: #14161a;
    --bg3: #1c1f26;
    --bg4: #232730;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --gold: #c9a44a;
    --gold-light: #e8c46a;
    --gold-dim: rgba(201,164,74,0.15);
    --gold-dim2: rgba(201,164,74,0.25);
    --red: #c44a4a;
    --red-dim: rgba(196,74,74,0.15);
    --green: #4aaa6a;
    --green-dim: rgba(74,170,106,0.12);
    --text: #d8d4c8;
    --text2: #8a8678;
    --text3: #5a5850;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Rajdhani', sans-serif;
    --radius: 6px;
  }

  body {
    font-family: var(--display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
    letter-spacing: 0.01em;
  }

  /* Subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201,164,74,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,164,74,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

  /* Header */
  header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border2); }
  header h1 { font-family: var(--display); font-size: 28px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-light); }
  header .sub { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; }

  /* Point bar */
  #point-bar {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 12px;
    align-items: end;
    margin-bottom: 28px;
    padding: 16px 20px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
  }
  .stat-block label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); display: block; margin-bottom: 4px; }
  .stat-block .val { font-family: var(--mono); font-size: 30px; font-weight: 400; }
  .stat-block .val.total { color: var(--text2); }
  .stat-block .val.spent { color: var(--gold); }
  .stat-block .val.remaining.low { color: var(--red); }
  .stat-block .val.remaining.ok { color: var(--green); }

  .progress-bar-wrap { display: flex; flex-direction: column; gap: 6px; }
  .progress-bar-wrap label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .progress-outer { height: 6px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
  .progress-inner { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.25s ease, background 0.25s; }
  .progress-inner.over { background: var(--red); }

  /* Points input */
  .pts-input-wrap { display: flex; flex-direction: column; gap: 4px; }
  .pts-input-wrap label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .pts-input-wrap input[type=number] {
    width: 90px;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--gold-light);
    font-family: var(--mono);
    font-size: 20px;
    padding: 4px 10px;
    outline: none;
    appearance: textfield;
    -moz-appearance: textfield;
  }
  .pts-input-wrap input[type=number]::-webkit-outer-spin-button,
  .pts-input-wrap input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .pts-input-wrap input:focus { border-color: var(--gold); }

  /* Sections */
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .section-header h2 { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); font-weight: 500; }
  .section-header .line { flex: 1; height: 1px; background: var(--border); }
  .section-header button { font-family: var(--display); }

  /* Ability cards */
  #ability-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }

  .ability-card {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 12px;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s, background 0.15s;
  }
  .ability-card:hover { border-color: var(--border2); }
  .ability-card.selected { background: var(--bg3); border-color: rgba(201,164,74,0.4); }
  .ability-card.over-budget { border-color: rgba(196,74,74,0.4); background: var(--bg3); }

  .ability-info { min-width: 0; }
  .ability-name { font-size: 17px; font-weight: 600; letter-spacing: 0.04em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ability-card.selected .ability-name { color: var(--gold-light); }
  .ability-meta { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* Rank selector */
  .rank-control { display: flex; align-items: center; gap: 8px; }
  .rank-btn {
    width: 26px; height: 26px;
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    font-family: var(--mono);
    flex-shrink: 0;
    user-select: none;
  }
  .rank-btn:hover:not(:disabled) { background: var(--gold-dim2); border-color: var(--gold); color: var(--gold-light); }
  .rank-btn:disabled { opacity: 0.25; cursor: default; }
  .rank-display { font-family: var(--mono); font-size: 14px; min-width: 36px; text-align: center; color: var(--text); }
  .rank-display span.current { color: var(--gold); }
  .rank-display span.sep { color: var(--text3); }
  .rank-display span.max { color: var(--text2); }

  /* Cost chip */
  .cost-chip {
    font-family: var(--mono);
    font-size: 13px;
    min-width: 52px;
    text-align: right;
    color: var(--text2);
    white-space: nowrap;
  }
  .cost-chip.active { color: var(--gold); }
  .cost-chip.over { color: var(--red); }

  /* Remove btn */
  .remove-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.1s, background 0.1s;
    line-height: 1;
    flex-shrink: 0;
  }
  .remove-btn:hover { color: var(--red); background: var(--red-dim); }

  /* Add ability form */
  #add-form {
    display: grid;
    grid-template-columns: 1fr 120px 120px auto;
    gap: 10px;
    align-items: end;
    padding: 16px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 28px;
  }

  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
  .field input {
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--display);
    font-size: 15px;
    padding: 7px 10px;
    outline: none;
    width: 100%;
  }
  .field input:focus { border-color: var(--gold); }
  .field input::placeholder { color: var(--text3); }

  /* Builds section */
  #builds-section { margin-bottom: 28px; }
  #build-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .build-chip {
    display: flex; align-items: center; gap: 0;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
    font-size: 14px;
  }
  .build-chip-name {
    padding: 6px 12px;
    cursor: pointer;
    color: var(--text);
    letter-spacing: 0.03em;
    transition: background 0.1s, color 0.1s;
  }
  .build-chip-name:hover { background: var(--gold-dim2); color: var(--gold-light); }
  .build-chip-del {
    padding: 6px 10px;
    background: none; border: none; border-left: 1px solid var(--border);
    color: var(--text3); cursor: pointer; font-size: 12px;
    transition: background 0.1s, color 0.1s;
  }
  .build-chip-del:hover { background: var(--red-dim); color: var(--red); }

  .save-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .save-row input {
    background: var(--bg4);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--display);
    font-size: 14px;
    padding: 6px 10px;
    outline: none;
    width: 200px;
  }
  .save-row input:focus { border-color: var(--gold); }

  /* Buttons */
  .btn {
    font-family: var(--display);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--gold-dim2);
    border-color: var(--gold);
    color: var(--gold-light);
  }
  .btn-primary:hover { background: rgba(201,164,74,0.35); }
  .btn-ghost {
    background: transparent;
    border-color: var(--border2);
    color: var(--text2);
  }
  .btn-ghost:hover { border-color: var(--gold); color: var(--gold-light); background: var(--gold-dim); }
  .btn-danger {
    background: transparent;
    border-color: var(--border2);
    color: var(--text3);
  }
  .btn-danger:hover { border-color: var(--red); color: var(--red); background: var(--red-dim); }

  /* Reset row */
  #bottom-bar { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

  /* Empty state */
  .empty-state {
    padding: 32px;
    text-align: center;
    color: var(--text3);
    font-size: 14px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px dashed var(--border2);
    border-radius: var(--radius);
  }

  /* Notification */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--gold); color: var(--gold-light);
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    padding: 8px 20px; border-radius: var(--radius);
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    z-index: 100;
  }
  #toast.show { opacity: 1; }

  /* Tooltip for over-budget */
  .over-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--red);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: none;
  }
  .ability-card.over-budget .over-label { display: block; }

  @media (max-width: 620px) {
    #point-bar { grid-template-columns: 1fr 1fr; }
    #add-form { grid-template-columns: 1fr 1fr; }
    #add-form .add-btn-wrap { grid-column: span 2; }
    .ability-card { grid-template-columns: 1fr auto auto; }
    .remove-btn { grid-column: 3; grid-row: 1; }
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Talent Calculator</h1>
    <span class="sub">/ ability point tracker</span>
  </header>

  <!-- Point totals bar -->
  <div id="point-bar">
    <div class="pts-input-wrap">
      <label>Total Points</label>
      <input type="number" id="total-pts" value="51" min="0" max="9999" />
    </div>
    <div class="stat-block">
      <label>Spent</label>
      <div class="val spent" id="spent-val">0</div>
    </div>
    <div class="stat-block">
      <label>Remaining</label>
      <div class="val remaining ok" id="remaining-val">51</div>
    </div>
    <div class="progress-bar-wrap" style="min-width:120px">
      <label>Usage</label>
      <div class="progress-outer">
        <div class="progress-inner" id="progress-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Add Ability Form -->
  <div class="section-header">
    <h2>Abilities</h2>
    <div class="line"></div>
    <button class="btn btn-ghost" id="import-btn" title="Import abilities from JSON">Import</button>
    <button class="btn btn-ghost" id="export-btn" title="Export abilities as JSON">Export</button>
  </div>

  <div id="add-form">
    <div class="field">
      <label>Ability Name</label>
      <input type="text" id="f-name" placeholder="e.g. Fireball" maxlength="40" />
    </div>
    <div class="field">
      <label>Max Ranks</label>
      <input type="number" id="f-ranks" value="5" min="1" max="99" />
    </div>
    <div class="field">
      <label>Cost / Rank</label>
      <input type="number" id="f-cost" value="1" min="1" max="999" />
    </div>
    <div class="field add-btn-wrap" style="justify-content:flex-end">
      <label>&nbsp;</label>
      <button class="btn btn-primary" id="add-btn">+ Add</button>
    </div>
  </div>

  <div id="ability-list"></div>

  <!-- Builds section -->
  <div id="builds-section">
    <div class="section-header">
      <h2>Saved Builds</h2>
      <div class="line"></div>
    </div>
    <div class="save-row">
      <input type="text" id="build-name" placeholder="Build name..." maxlength="30" />
      <button class="btn btn-primary" id="save-build-btn">Save Build</button>
    </div>
    <div id="build-list"></div>
  </div>

  <div id="bottom-bar">
    <button class="btn btn-danger" id="reset-btn">Reset Selections</button>
    <button class="btn btn-danger" id="clear-all-btn">Clear All</button>
  </div>
</div>

<div id="toast"></div>

<!-- Hidden file input for import -->
<input type="file" id="import-file" accept=".json" style="display:none">

<script>
  const state = {
    totalPoints: 51,
    abilities: [],
    builds: JSON.parse(localStorage.getItem('tc_builds') || '[]'),
  };

  let nextId = 1;

  function uid() { return nextId++; }

  function totalSpent() {
    return state.abilities.reduce((sum, a) => sum + a.currentRank * a.costPerRank, 0);
  }

  function updatePointBar() {
    const spent = totalSpent();
    const remaining = state.totalPoints - spent;
    const pct = state.totalPoints > 0 ? Math.min(100, (spent / state.totalPoints) * 100) : 0;

    document.getElementById('spent-val').textContent = spent;
    const remEl = document.getElementById('remaining-val');
    remEl.textContent = remaining;
    remEl.className = 'val remaining ' + (remaining < 0 ? 'low' : 'ok');

    const bar = document.getElementById('progress-bar');
    bar.style.width = pct.toFixed(1) + '%';
    bar.className = 'progress-inner' + (remaining < 0 ? ' over' : '');
  }

  function renderAbilities() {
    const list = document.getElementById('ability-list');
    if (state.abilities.length === 0) {
      list.innerHTML = '<div class="empty-state">No abilities added yet — add one above</div>';
      return;
    }

    const spent = totalSpent();
    const remaining = state.totalPoints - spent;

    list.innerHTML = '';
    state.abilities.forEach(a => {
      const cost = a.currentRank * a.costPerRank;
      const isSelected = a.currentRank > 0;
      const wouldOverBudget = !isSelected && a.costPerRank > remaining;

      const card = document.createElement('div');
      card.className = 'ability-card' + (isSelected ? ' selected' : '') + (isSelected && remaining < 0 ? ' over-budget' : '');

      card.innerHTML = `
        <div class="ability-info">
          <div class="ability-name">${escHtml(a.name)}</div>
          <div class="ability-meta">${a.costPerRank} pt${a.costPerRank !== 1 ? 's' : ''} / rank &nbsp;·&nbsp; max ${a.maxRanks} rank${a.maxRanks !== 1 ? 's' : ''}</div>
          <div class="over-label">over budget</div>
        </div>
        <div class="rank-control">
          <button class="rank-btn" data-id="${a.id}" data-action="down" ${a.currentRank <= 0 ? 'disabled' : ''}>-</button>
          <div class="rank-display">
            <span class="current">${a.currentRank}</span>
            <span class="sep">/</span>
            <span class="max">${a.maxRanks}</span>
          </div>
          <button class="rank-btn" data-id="${a.id}" data-action="up" ${a.currentRank >= a.maxRanks ? 'disabled' : ''}>+</button>
        </div>
        <div class="cost-chip ${isSelected ? (remaining < 0 ? 'over' : 'active') : ''}">${cost > 0 ? cost + ' pt' + (cost !== 1 ? 's' : '') : '—'}</div>
        <button class="remove-btn" data-id="${a.id}" title="Remove ability">✕</button>
      `;

      list.appendChild(card);
    });

    // Events
    list.querySelectorAll('.rank-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const a = state.abilities.find(x => x.id == btn.dataset.id);
        if (!a) return;
        if (btn.dataset.action === 'up') {
          const addCost = a.costPerRank;
          const rem = state.totalPoints - totalSpent();
          if (a.currentRank < a.maxRanks && addCost <= rem) {
            a.currentRank++;
          } else if (a.currentRank < a.maxRanks && addCost > rem) {
            toast('Not enough points!');
          }
        } else {
          if (a.currentRank > 0) a.currentRank--;
        }
        renderAbilities();
        updatePointBar();
      });
    });

    list.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.abilities = state.abilities.filter(x => x.id != btn.dataset.id);
        renderAbilities();
        updatePointBar();
      });
    });
  }

  function renderBuilds() {
    const list = document.getElementById('build-list');
    if (state.builds.length === 0) {
      list.innerHTML = '<div style="font-size:13px;color:var(--text3);letter-spacing:0.06em;">No saved builds yet.</div>';
      return;
    }
    list.innerHTML = '';
    state.builds.forEach((b, i) => {
      const chip = document.createElement('div');
      chip.className = 'build-chip';
      chip.innerHTML = `
        <div class="build-chip-name" data-i="${i}">${escHtml(b.name)}</div>
        <button class="build-chip-del" data-i="${i}">✕</button>
      `;
      list.appendChild(chip);
    });

    list.querySelectorAll('.build-chip-name').forEach(el => {
      el.addEventListener('click', () => loadBuild(state.builds[el.dataset.i]));
    });
    list.querySelectorAll('.build-chip-del').forEach(el => {
      el.addEventListener('click', () => {
        state.builds.splice(el.dataset.i, 1);
        saveBuildsStorage();
        renderBuilds();
      });
    });
  }

  function loadBuild(build) {
    state.totalPoints = build.totalPoints;
    state.abilities = build.abilities.map(a => ({ ...a, id: uid() }));
    document.getElementById('total-pts').value = build.totalPoints;
    renderAbilities();
    updatePointBar();
    toast('Build loaded: ' + build.name);
  }

  function saveBuildsStorage() {
    localStorage.setItem('tc_builds', JSON.stringify(state.builds));
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // Total points input
  document.getElementById('total-pts').addEventListener('input', e => {
    const v = parseInt(e.target.value);
    state.totalPoints = isNaN(v) ? 0 : Math.max(0, v);
    updatePointBar();
    renderAbilities();
  });

  // Add ability
  function addAbility() {
    const name = document.getElementById('f-name').value.trim();
    const ranks = parseInt(document.getElementById('f-ranks').value);
    const cost = parseInt(document.getElementById('f-cost').value);
    if (!name) { toast('Enter an ability name.'); document.getElementById('f-name').focus(); return; }
    if (isNaN(ranks) || ranks < 1) { toast('Max ranks must be at least 1.'); return; }
    if (isNaN(cost) || cost < 1) { toast('Cost must be at least 1.'); return; }
    state.abilities.push({ id: uid(), name, maxRanks: ranks, costPerRank: cost, currentRank: 0 });
    document.getElementById('f-name').value = '';
    document.getElementById('f-name').focus();
    renderAbilities();
    updatePointBar();
  }

  document.getElementById('add-btn').addEventListener('click', addAbility);
  document.getElementById('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') addAbility(); });

  // Save build
  document.getElementById('save-build-btn').addEventListener('click', () => {
    const name = document.getElementById('build-name').value.trim() || 'Build ' + (state.builds.length + 1);
    const snap = {
      name,
      totalPoints: state.totalPoints,
      abilities: state.abilities.map(a => ({ name: a.name, maxRanks: a.maxRanks, costPerRank: a.costPerRank, currentRank: a.currentRank }))
    };
    state.builds.push(snap);
    saveBuildsStorage();
    document.getElementById('build-name').value = '';
    renderBuilds();
    toast('Build saved: ' + name);
  });

  // Reset selections
  document.getElementById('reset-btn').addEventListener('click', () => {
    state.abilities.forEach(a => a.currentRank = 0);
    renderAbilities();
    updatePointBar();
    toast('Selections reset.');
  });

  // Clear all
  document.getElementById('clear-all-btn').addEventListener('click', () => {
    if (!confirm('Clear all abilities? This cannot be undone.')) return;
    state.abilities = [];
    renderAbilities();
    updatePointBar();
    toast('All abilities cleared.');
  });

  // Export
  document.getElementById('export-btn').addEventListener('click', () => {
    const data = {
      totalPoints: state.totalPoints,
      abilities: state.abilities.map(a => ({ name: a.name, maxRanks: a.maxRanks, costPerRank: a.costPerRank, currentRank: a.currentRank }))
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'talent-build.json'; a.click();
    URL.revokeObjectURL(url);
    toast('Exported!');
  });

  // Import
  document.getElementById('import-btn').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.abilities || !Array.isArray(data.abilities)) throw new Error('Invalid format');
        state.totalPoints = data.totalPoints || state.totalPoints;
        document.getElementById('total-pts').value = state.totalPoints;
        state.abilities = data.abilities.map(a => ({
          id: uid(),
          name: String(a.name || 'Ability'),
          maxRanks: Math.max(1, parseInt(a.maxRanks) || 1),
          costPerRank: Math.max(1, parseInt(a.costPerRank) || 1),
          currentRank: Math.max(0, parseInt(a.currentRank) || 0)
        }));
        renderAbilities();
        updatePointBar();
        toast('Imported!');
      } catch (err) {
        toast('Import failed: invalid JSON');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // Init with some example abilities
  const examples = [
    { name: 'Fireball', maxRanks: 5, costPerRank: 2 },
    { name: 'Ice Armor', maxRanks: 3, costPerRank: 3 },
    { name: 'Swift Feet', maxRanks: 2, costPerRank: 2 },
    { name: 'Critical Strike', maxRanks: 10, costPerRank: 1 },
    { name: 'Mana Shield', maxRanks: 1, costPerRank: 5 },
  ];
  examples.forEach(e => state.abilities.push({ id: uid(), currentRank: 0, ...e }));

  renderAbilities();
  updatePointBar();
  renderBuilds();
</script>
</body>
</html>
